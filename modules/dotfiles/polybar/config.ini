; =============================================================================
; Polybar config — Catppuccin Mocha
; =============================================================================

[colors]
bg       = #1e1e2e
bg-alt   = #181825
fg       = #cdd6f4
fg-alt   = #45475a
accent   = #89b4fa
green    = #a6e3a1
yellow   = #f9e2af
red      = #f38ba8
mauve    = #cba4f7
teal     = #94e2d5

; =============================================================================
; Base bar — shared settings inherited by both bars
; =============================================================================

[bar/base]
width                = 100%
height               = 28
offset-y             = 0
fixed-center         = true

background           = ${colors.bg}
foreground           = ${colors.fg}

line-size            = 2
line-color           = ${colors.accent}

padding-left         = 1
padding-right        = 2

module-margin-left   = 1
module-margin-right  = 1

font-0               = JetBrainsMono Nerd Font:style=Regular:size=10;2
font-1               = JetBrainsMono Nerd Font:style=Bold:size=10;2

separator            = " "
separator-foreground = ${colors.fg-alt}

override-redirect    = false

cursor-click         = pointer

; =============================================================================
; Main bar — HDMI-A-0 (right monitor, primary)
; Carries the system tray (only one tray can exist per X display)
; =============================================================================

[bar/main]
inherit              = bar/base
monitor              = HDMI-A-0

modules-left         = i3
modules-center       = date
modules-right        = cpu memory gpu disk network pulseaudio tray

; =============================================================================
; Secondary bar — DisplayPort-1 (left monitor)
; =============================================================================

[bar/secondary]
inherit              = bar/base
monitor              = DisplayPort-1

modules-left         = i3
modules-center       = date
modules-right        = cpu memory gpu disk network pulseaudio

; =============================================================================
; Modules
; =============================================================================

[module/i3]
type                 = internal/i3
pin-workspaces       = true
strip-wsnumbers      = true
index-sort           = true
enable-click         = true
enable-scroll        = false
wrapping-scroll      = false
reverse-scroll       = false

label-focused        = %name%
label-focused-foreground = ${colors.accent}
label-focused-underline  = ${colors.accent}
label-focused-padding    = 2

label-unfocused      = %name%
label-unfocused-foreground = ${colors.fg-alt}
label-unfocused-padding    = 2

label-visible        = %name%
label-visible-foreground = ${colors.fg-alt}
label-visible-padding    = 2

label-urgent         = %name%
label-urgent-foreground  = ${colors.red}
label-urgent-padding     = 2

; -----------------------------------------------------------------------------

[module/cpu]
type                 = internal/cpu
interval             = 2
format               = <label>
format-prefix        = " "
format-prefix-foreground = ${colors.accent}
label                = CPU %percentage%%
click-left           = alacritty -e resources &

; -----------------------------------------------------------------------------

[module/memory]
type                 = internal/memory
interval             = 2
format               = <label>
format-prefix        = " "
format-prefix-foreground = ${colors.mauve}
label                = RAM %percentage_used%%
click-left           = alacritty -e resources &

; -----------------------------------------------------------------------------

[module/gpu]
type                 = custom/script
exec                 = cat /sys/class/drm/card0/device/gpu_busy_percent 2>/dev/null | awk '{printf "%d%%", $1}' || echo "N/A"
interval             = 2
format               = <label>
format-prefix        = "󰍛 "
format-prefix-foreground = ${colors.teal}
label                = GPU %output%
click-left           = alacritty -e resources &

; -----------------------------------------------------------------------------

[module/disk]
type                 = internal/fs
mount-0              = /
interval             = 30
fixed-values         = true
format-mounted       = <label-mounted>
format-mounted-prefix        = "󰋊 "
format-mounted-prefix-foreground = ${colors.yellow}
label-mounted        = %percentage_used%%

; -----------------------------------------------------------------------------

[module/network]
type                 = internal/network
interface            = enp114s0
interval             = 3

format-connected     = <label-connected>
format-connected-prefix        = "󰈀 "
format-connected-prefix-foreground = ${colors.green}
label-connected      = %downspeed:8%

format-disconnected  = <label-disconnected>
format-disconnected-prefix     = "󰈀 "
format-disconnected-prefix-foreground = ${colors.red}
label-disconnected   = down

; -----------------------------------------------------------------------------

[module/pulseaudio]
type                 = internal/pulseaudio
use-ui-max           = true
interval             = 5

format-volume        = <label-volume>
format-volume-prefix         = "󰕾 "
format-volume-prefix-foreground = ${colors.fg}
label-volume         = %percentage%%

format-muted         = <label-muted>
format-muted-prefix          = "󰖁 "
format-muted-prefix-foreground = ${colors.fg-alt}
label-muted          = muted
label-muted-foreground = ${colors.fg-alt}

click-right          = pavucontrol &
scroll-up            = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down          = pactl set-sink-volume @DEFAULT_SINK@ -5%
click-left           = pactl set-sink-mute @DEFAULT_SINK@ toggle

; -----------------------------------------------------------------------------

[module/tray]
type                 = internal/tray
tray-maxsize         = 16
tray-padding         = 4
tray-background      = ${colors.bg}

; -----------------------------------------------------------------------------

[module/date]
type                 = internal/date
interval             = 10
date                 = %a %d %b
time                 = %H:%M
format               = <label>
format-prefix        = "󰃭 "
format-prefix-foreground = ${colors.accent}
label                = %date%  %time%
label-foreground     = ${colors.fg}
